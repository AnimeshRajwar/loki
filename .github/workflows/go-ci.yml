name: Go CI

on:
  push:
    branches: [ master, issue-* ]
  pull_request:
    branches: [ master, issue-* ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Tidy modules
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Lint (go fmt)
        run: go fmt ./...

      - name: Vet
        run: go vet ./...
